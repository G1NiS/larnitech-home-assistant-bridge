name: "Larnitech Bridge for Home Assistant"
version: "0.1.0"
slug: "larnitech_ha_bridge"
description: "Unofficial Home Assistant bridge for Larnitech-compatible systems using API2 and MQTT Discovery"
url: "https://github.com/GiNiS/larnitech-home-assistant-bridge"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false

options:
  larnitech_host: "192.168.xxx.xxx"
  larnitech_port: 2041
  larnitech_api_key: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_discovery_prefix: "homeassistant"
  bridge_id: "larnitech"
  log_level: "debug"
  ignored_areas: []
  ignored_types: []
  publish_unsupported_devices: true

schema:
  larnitech_host: "str"
  larnitech_port: "port"
  larnitech_api_key: "password"
  mqtt_host: "str"
  mqtt_port: "port"
  mqtt_username: "str?"
  mqtt_password: "password?"
  mqtt_discovery_prefix: "str"
  bridge_id: "str"
  log_level: "list(debug|info|warning|error)"
  ignored_areas:
    - "str?"
  ignored_types:
    - "str?"
  publish_unsupported_devices: "bool"
